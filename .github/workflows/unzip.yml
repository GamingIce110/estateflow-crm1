name: Unzip EstateFlow CRM

on: push

permissions:
  contents: write

jobs:
  unzip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - name: Remove old output folder
        run: git rm -r --ignore-unmatch output/

      - name: Unzip file
        run: unzip -o build-estateflow-crm-app.zip

      - name: Commit unzipped files
        run: |
          git config user.email "gamingice691@gmail.com"
          git config user.name "GamingIce110"
          git add .
          git commit -m "Unzipped EstateFlow CRM build"
          git push